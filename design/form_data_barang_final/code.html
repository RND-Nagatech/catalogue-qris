<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>

<title>Form Data Barang - POS System</title>

<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #004532;
            box-shadow: 0 0 0 1px #004532;
        }
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased transition-colors duration-300">
<!-- Top AppBar -->
<header class="bg-surface/80 backdrop-blur-md fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 border-b border-outline-variant/30">
<div class="flex items-center gap-2">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-primary">menu</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Data Barang</h1>
</div>
<div class="flex items-center gap-1">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors" id="dark-mode-toggle">
<span class="material-symbols-outlined text-on-surface-variant">dark_mode</span>
</button>
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container-low transition-colors relative">
<span class="material-symbols-outlined text-primary">shopping_cart</span>
<span class="absolute top-1 right-1 w-2 h-2 bg-secondary rounded-full"></span>
</button>
</div>
</header>
<main class="pt-20 pb-40 px-margin-mobile max-w-lg mx-auto min-h-screen">
<!-- Form Header -->
<div class="flex items-center justify-between mb-6">
<h2 class="font-headline-md text-headline-md text-on-surface">Detail Produk</h2>
<button class="w-8 h-8 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="space-y-stack-lg">
<!-- Media Upload Section -->
<section class="bg-surface-container-lowest border border-outline-variant/50 rounded-2xl p-5 grid grid-cols-5 gap-4 shadow-sm">
<div class="col-span-2 aspect-square bg-surface-container-low border-2 border-dashed border-outline-variant/60 rounded-xl flex flex-col items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined text-4xl mb-2 text-outline">photo_camera</span>
<span class="font-label-sm text-label-sm opacity-60">120 x 120</span>
</div>
<div class="col-span-3 flex flex-col justify-center gap-3">
<button class="flex items-center justify-center gap-3 border border-outline-variant/60 h-12 rounded-xl font-body-md text-on-surface-variant hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-primary">image</span>
<span class="font-medium">Pilih Gambar</span>
</button>
<button class="flex items-center justify-center gap-3 border border-outline-variant/60 h-12 rounded-xl font-body-md text-on-surface-variant hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-primary">videocam</span>
<span class="font-medium">WebCam</span>
</button>
</div>
</section>
<!-- Barcode Section -->
<section class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">barcode</span>
                    KODE BARCODE
                </label>
<div class="relative group">
<input class="w-full h-14 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring transition-all" placeholder="Scan atau input kode barcode" type="text"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-outline hover:text-primary transition-colors">
<span class="material-symbols-outlined">barcode_scanner</span>
</button>
</div>
<button class="w-full flex items-center justify-center gap-2 h-14 rounded-xl border border-primary text-primary font-headline-md text-body-lg hover:bg-primary/5 transition-all active:scale-95 mt-2 bg-white">
<span class="material-symbols-outlined text-xl">qr_code_scanner</span>
<span>Ambil Data Barcode</span>
</button>
</section>
<!-- Product Details -->
<section class="space-y-stack-md">
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">NAMA BARANG</label>
<input class="w-full h-14 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring" placeholder="Masukkan nama barang" type="text"/>
</div>
<!-- Numerical Grid -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">BERAT JUAL (gr)</label>
<input class="w-full h-14 px-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring text-right font-semibold" type="number" value="0"/>
</div>
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">HARGA JUAL</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-label-sm text-outline">Rp</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring text-right font-semibold" type="number" value="0"/>
</div>
</div>
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">HARGA/GRAM</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-label-sm text-outline">Rp</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring text-right font-semibold" type="number" value="0"/>
</div>
</div>
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">ONGKOS</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-label-sm text-outline">Rp</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring text-right font-semibold" type="number" value="0"/>
</div>
</div>
</div>
<!-- Total Highlight -->
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">TOTAL ESTIMASI</label>
<div class="relative">
<div class="w-full h-20 pl-4 pr-6 rounded-2xl bg-primary flex items-center justify-between shadow-lg">
<span class="text-on-primary font-headline-md opacity-80">Rp</span>
<span class="text-on-primary font-headline-lg text-2xl" id="total-val">0</span>
</div>
</div>
</div>
<!-- Notes Section -->
<div class="space-y-stack-sm">
<label class="font-label-sm text-label-sm text-outline px-1">KETERANGAN (OPSIONAL)</label>
<textarea class="w-full p-4 rounded-xl border border-outline-variant bg-surface-container-lowest font-body-md text-body-md input-focus-ring resize-none" placeholder="Catatan tambahan untuk barang ini..." rows="3"></textarea>
</div>
</section>
</div>
<!-- Sticky Floating Button -->
<div class="fixed bottom-24 left-0 right-0 px-margin-mobile z-40 max-w-lg mx-auto">
<button class="w-full h-16 bg-primary text-white rounded-2xl shadow-[0_8px_24px_rgba(0,69,50,0.3)] font-headline-md text-headline-md flex items-center justify-center gap-3 hover:bg-primary-container active:scale-95 transition-all">
<span class="material-symbols-outlined">add_shopping_cart</span>
<span>Tambah ke Keranjang</span>
</button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="bg-surface/90 backdrop-blur-md fixed bottom-0 w-full z-50 flex justify-around items-center h-20 pb-safe shadow-[0_-4px_16px_rgba(0,0,0,0.05)] border-t border-outline-variant/30">
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-all flex-1" href="#">
<span class="material-symbols-outlined mb-1">home</span>
<span class="font-label-sm text-[10px] uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-primary transition-all flex-1" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-sm text-[10px] font-bold uppercase tracking-wider">Sales</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-all flex-1" href="#">
<span class="material-symbols-outlined mb-1">shopping_bag</span>
<span class="font-label-sm text-[10px] uppercase tracking-wider">Stock</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-all flex-1" href="#">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-label-sm text-[10px] uppercase tracking-wider">History</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant opacity-60 hover:opacity-100 transition-all flex-1" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-label-sm text-[10px] uppercase tracking-wider">Settings</span>
</a>
</nav>
<script>
        // Dark Mode Toggle Logic
        const darkModeToggle = document.getElementById('dark-mode-toggle');
        const html = document.documentElement;
        
        darkModeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            const icon = darkModeToggle.querySelector('.material-symbols-outlined');
            if (html.classList.contains('dark')) {
                icon.textContent = 'light_mode';
            } else {
                icon.textContent = 'dark_mode';
            }
        });

        // Numeric calculations
        const numInputs = document.querySelectorAll('input[type="number"]');
        const totalDisplay = document.getElementById('total-val');
        
        numInputs.forEach(input => {
            input.addEventListener('input', () => {
                let sum = 0;
                numInputs.forEach(i => sum += Number(i.value || 0));
                totalDisplay.textContent = sum.toLocaleString('id-ID');
            });
        });

        // Click interaction simulation for "Dropdown" feeling elements
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if(this.textContent.includes('Pilih') || this.textContent.includes('Ambil')) {
                    // Logic to trigger BottomSheet (handled by parent context in real app)
                    this.classList.add('bg-surface-container');
                    setTimeout(() => this.classList.remove('bg-surface-container'), 200);
                }
            });
        });
    </script>
</body></html>
