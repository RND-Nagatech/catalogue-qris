<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>Form Data Customer - Premium Emerald</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-container": "#fe932c",
                    "on-primary-fixed": "#002116",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#d3e4fe",
                    "tertiary-container": "#44546a",
                    "primary": "#004532",
                    "outline-variant": "#bec9c2",
                    "surface-bright": "#f7f9fb",
                    "secondary-fixed-dim": "#ffb77d",
                    "on-primary-container": "#8bd6b7",
                    "inverse-primary": "#8bd6b6",
                    "outline": "#6f7973",
                    "on-background": "#191c1e",
                    "on-secondary": "#ffffff",
                    "primary-fixed": "#a6f2d1",
                    "secondary-fixed": "#ffdcc3",
                    "background": "#f7f9fb",
                    "error-container": "#ffdad6",
                    "surface-container-lowest": "#ffffff",
                    "primary-container": "#065f46",
                    "on-secondary-fixed": "#2f1500",
                    "tertiary-fixed-dim": "#b7c8e1",
                    "on-surface": "#191c1e",
                    "inverse-on-surface": "#eff1f3",
                    "surface-variant": "#e0e3e5",
                    "surface-container": "#eceef0",
                    "on-tertiary-container": "#b8c8e2",
                    "surface": "#f7f9fb",
                    "on-secondary-fixed-variant": "#6e3900",
                    "error": "#ba1a1a",
                    "surface-container-low": "#f2f4f6",
                    "on-tertiary-fixed-variant": "#38485d",
                    "on-primary-fixed-variant": "#00513b",
                    "tertiary": "#2d3d52",
                    "on-surface-variant": "#3f4944",
                    "surface-tint": "#1b6b51",
                    "on-tertiary-fixed": "#0b1c30",
                    "surface-dim": "#d8dadc",
                    "on-secondary-container": "#663500",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container-high": "#e6e8ea",
                    "secondary": "#904d00",
                    "inverse-surface": "#2d3133",
                    "primary-fixed-dim": "#8bd6b6",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter-md": "1rem",
                    "stack-lg": "1.5rem",
                    "stack-sm": "0.5rem",
                    "margin-mobile": "1rem",
                    "container-padding": "1.25rem",
                    "stack-md": "1rem"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Manrope"],
                    "headline-lg": ["Manrope"],
                    "body-md": ["Manrope"],
                    "label-sm": ["Manrope"],
                    "headline-md": ["Manrope"],
                    "body-lg": ["Manrope"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            box-shadow: none;
        }
        .ios-bottom-sheet-handle {
            width: 36px;
            height: 4px;
            background-color: #cbd5e1;
            border-radius: 2px;
            margin: 8px auto 0;
        }
        .dark .ios-bottom-sheet-handle {
            background-color: #475569;
        }
    </style>
</head>
<body class="bg-surface text-on-surface dark:bg-inverse-surface dark:text-inverse-on-surface antialiased overflow-hidden min-h-screen">
<!-- Modal Background Layer -->
<div class="fixed inset-0 bg-black/40 dark:bg-black/60 flex items-end md:items-center justify-center z-50 transition-colors duration-300">
<!-- Modal Container (Form) -->
<main class="bg-surface-container-lowest dark:bg-surface-container-low w-full max-w-xl max-h-[90dvh] md:max-h-[839px] rounded-t-3xl md:rounded-3xl shadow-2xl flex flex-col overflow-hidden relative transition-all duration-300">
<!-- Handle for mobile visual -->
<div class="ios-bottom-sheet-handle md:hidden"></div>
<!-- Top App Bar / Header -->
<header class="flex justify-between items-center px-6 h-16 w-full border-b border-outline-variant/20 dark:border-outline/20 sticky top-0 bg-surface-container-lowest dark:bg-surface-container-low z-10">
<div class="flex items-center gap-3">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface dark:text-inverse-on-surface">Form Data Customer</h1>
</div>
<div class="flex items-center gap-1">
<button aria-label="Toggle Dark Mode" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container dark:hover:bg-surface-container-high transition-colors" onclick="toggleDarkMode()">
<span class="material-symbols-outlined text-on-surface-variant dark:text-outline-variant" id="dark-mode-icon">dark_mode</span>
</button>
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container dark:hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-on-surface-variant dark:text-outline-variant">close</span>
</button>
</div>
</header>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto px-6 py-6 custom-scrollbar space-y-6">
<!-- Field Group: Sales Selection -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant uppercase tracking-wider">Pilih Kode Sales</label>
<div class="relative">
<select class="w-full h-12 bg-surface-container-low dark:bg-surface-container border border-outline-variant dark:border-outline/30 rounded-lg px-4 font-body-md text-on-surface dark:text-inverse-on-surface appearance-none focus:border-primary focus:ring-1 focus:ring-primary transition-all">
<option disabled="" selected="" value="">Pilih kode sales</option>
<option value="S001">S001 - Ahmad</option>
<option value="S002">S002 - Budi</option>
<option value="S003">S003 - Citra</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant dark:text-outline-variant pointer-events-none">expand_more</span>
</div>
</div>
<!-- Field Group: Pelanggan Type (Segmented Control) -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant uppercase tracking-wider">Pilih Pelanggan</label>
<div class="flex gap-1 p-1 bg-surface-container dark:bg-surface-container-highest rounded-xl border border-outline-variant/10 dark:border-outline/10">
<button class="flex-1 h-11 flex items-center justify-center rounded-lg font-label-sm text-label-sm transition-all bg-surface-container-lowest dark:bg-surface-container-low text-primary dark:text-primary-fixed shadow-sm ring-1 ring-primary/20" id="btn-non-member" onclick="toggleSegment('non-member')">
                        NON MEMBER
                    </button>
<button class="flex-1 h-11 flex items-center justify-center rounded-lg font-label-sm text-label-sm transition-all text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest" id="btn-member" onclick="toggleSegment('member')">
                        MEMBER
                    </button>
</div>
</div>
<!-- Field Group: Customer Code -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant uppercase tracking-wider">Kode Customer</label>
<input class="w-full h-12 bg-surface-container-low dark:bg-surface-container border border-outline-variant dark:border-outline/30 rounded-lg px-4 font-body-md text-on-surface dark:text-inverse-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant dark:placeholder:text-outline/50" placeholder="AUTO / kode member" type="text"/>
</div>
<!-- Search Member Action (Secondary Styled) -->
<button class="w-full h-12 flex items-center justify-center gap-2 border-2 border-primary text-primary dark:text-primary-fixed font-body-lg rounded-lg hover:bg-primary/5 dark:hover:bg-primary-fixed/10 transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">search</span>
                Ambil Data Member
            </button>
<!-- Field Group: Personal Info -->
<div class="space-y-5 pt-2 border-t border-outline-variant/20 dark:border-outline/20">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant uppercase tracking-wider">Nama Customer</label>
<input class="w-full h-12 bg-surface-container-low dark:bg-surface-container border border-outline-variant dark:border-outline/30 rounded-lg px-4 font-body-md text-on-surface dark:text-inverse-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant dark:placeholder:text-outline/50" placeholder="Nama customer" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant uppercase tracking-wider">No HP</label>
<input class="w-full h-12 bg-surface-container-low dark:bg-surface-container border border-outline-variant dark:border-outline/30 rounded-lg px-4 font-body-md text-on-surface dark:text-inverse-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all placeholder:text-outline-variant dark:placeholder:text-outline/50" placeholder="Nomor HP" type="tel"/>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline-variant uppercase tracking-wider">Alamat Customer</label>
<textarea class="w-full bg-surface-container-low dark:bg-surface-container border border-outline-variant dark:border-outline/30 rounded-lg p-4 font-body-md text-on-surface dark:text-inverse-on-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none placeholder:text-outline-variant dark:placeholder:text-outline/50" placeholder="Alamat customer" rows="3"></textarea>
</div>
</div>
<!-- Secondary Action -->
<button class="w-full h-12 flex items-center justify-center gap-2 border border-outline-variant dark:border-outline/30 text-on-surface-variant dark:text-outline-variant font-body-lg rounded-lg hover:bg-surface-container-low dark:hover:bg-surface-container-highest transition-colors active:scale-[0.98]">
<span class="material-symbols-outlined text-[20px]">filter_list</span>
                Filter Data Customer
            </button>
</div>
<!-- Sticky Bottom Actions -->
<footer class="p-6 border-t border-outline-variant/20 dark:border-outline/20 bg-surface-container-lowest dark:bg-surface-container-low sticky bottom-0">
<button class="w-full h-14 bg-primary dark:bg-primary-container text-white dark:text-primary-fixed font-body-lg rounded-xl shadow-lg shadow-primary/20 dark:shadow-black/40 hover:opacity-90 active:scale-[0.97] transition-all flex items-center justify-center">
                Simpan Data
            </button>
</footer>
</main>
</div>
<!-- Script for interactive elements -->
<script>
    function toggleSegment(type) {
        const nonMemberBtn = document.getElementById('btn-non-member');
        const memberBtn = document.getElementById('btn-member');
        
        const activeClasses = "bg-surface-container-lowest dark:bg-surface-container-low text-primary dark:text-primary-fixed shadow-sm ring-1 ring-primary/20";
        const inactiveClasses = "text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest";
        
        if (type === 'non-member') {
            nonMemberBtn.className = `flex-1 h-11 flex items-center justify-center rounded-lg font-label-sm text-label-sm transition-all ${activeClasses}`;
            memberBtn.className = `flex-1 h-11 flex items-center justify-center rounded-lg font-label-sm text-label-sm transition-all ${inactiveClasses}`;
        } else {
            memberBtn.className = `flex-1 h-11 flex items-center justify-center rounded-lg font-label-sm text-label-sm transition-all ${activeClasses}`;
            nonMemberBtn.className = `flex-1 h-11 flex items-center justify-center rounded-lg font-label-sm text-label-sm transition-all ${inactiveClasses}`;
        }
    }

    function toggleDarkMode() {
        const html = document.documentElement;
        const icon = document.getElementById('dark-mode-icon');
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            html.classList.add('light');
            icon.innerText = 'dark_mode';
        } else {
            html.classList.remove('light');
            html.classList.add('dark');
            icon.innerText = 'light_mode';
        }
    }
</script>
</body></html>
