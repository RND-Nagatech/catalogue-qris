<style>
        body {
            font-family: 'Hanken Grotesk', sans-serif;
            background-color: #f8f9fa;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #dee2e6;
            border-radius: 10px;
        }
        .input-glow:focus {
            box-shadow: 0 0 0 4px rgba(0, 106, 55, 0.1);
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim shadow-sm h-16 flex items-center justify-between px-md max-w-container-max mx-auto">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary p-sm active:scale-95 transition-transform">close</button>
<h1 class="font-headline-md text-headline-md text-primary">Form Data Barang</h1>
</div>
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center overflow-hidden border border-primary/20">
<img alt="Admin" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAAN-ALgOWsl0JPyO5IhCNxdbX1LRtzI1V5-w2h6_GPGMfl3AaUQSmNm3tYSwtmk-DLGzh2OwT6SzX-5Zh_TTNwVI39tt7P5H_a5l7D5fVU6YXgBcaVjWrIddHfiU70LCPfXAZmtjWGLgre6vdOSGpV9-E9JNi2wBq5R_PFxfbVJbiSMZylHSqU5DauFc2QdH18g6y3NYsY2EgXNH-Ce4MaXtB_uD8e4BddBzKHUzuY1hDK1GuWb3O3ErJBu8GSHmfn0hq-jzfiyNuy"/>
</div>
</header>
<!-- Main Content Container -->
<main class="w-full max-w-container-max mt-16 pb-32 px-md flex flex-col gap-lg overflow-y-auto custom-scrollbar">
<!-- Image Upload Section -->
<section class="mt-lg grid grid-cols-1 md:grid-cols-2 gap-md bg-surface-container-lowest p-lg rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)]">
<div class="flex flex-col items-center justify-center border-2 border-dashed border-outline-variant rounded-xl p-lg bg-surface aspect-square max-w-[200px] mx-auto w-full group hover:border-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-outline group-hover:text-primary text-[48px] mb-sm transition-colors">photo_camera</span>
<p class="font-label-caps text-label-caps text-outline group-hover:text-primary transition-colors">120 x 120</p>
</div>
<div class="flex flex-col justify-center gap-sm">
<button class="flex items-center justify-center gap-sm h-12 border border-outline rounded-lg font-headline-md text-body-lg text-on-surface-variant hover:bg-surface-variant/30 transition-colors active:scale-95">
<span class="material-symbols-outlined">image</span>
                    Pilih Gambar
                </button>
<button class="flex items-center justify-center gap-sm h-12 border border-outline rounded-lg font-headline-md text-body-lg text-on-surface-variant hover:bg-surface-variant/30 transition-colors active:scale-95">
<span class="material-symbols-outlined">linked_camera</span>
                    WebCam
                </button>
</div>
</section>
<!-- Barcode Section -->
<section class="flex flex-col gap-sm">
<label class="font-label-caps text-label-caps text-outline px-xs">KODE BARCODE</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-lowest border border-outline-variant rounded-xl px-md focus:outline-none focus:border-primary input-glow font-body-lg placeholder:text-outline/50" placeholder="Scan atau input kode barcode" type="text"/>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-outline">barcode_scanner</span>
</div>
<button class="mt-sm flex items-center justify-center gap-sm h-12 border-2 border-primary/20 text-primary rounded-xl font-headline-md text-body-lg hover:bg-primary/5 transition-all active:scale-95">
<span class="material-symbols-outlined">box_edit</span>
                Ambil Data Barang dari Barcode
            </button>
</section>
<!-- Main Form Fields -->
<form class="flex flex-col gap-lg">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-outline px-xs">NAMA BARANG</label>
<input class="w-full h-14 bg-surface-container-lowest border border-outline-variant rounded-xl px-md focus:outline-none focus:border-primary input-glow font-body-lg" placeholder="Nama barang" type="text"/>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-outline px-xs">BERAT JUAL (GR)</label>
<input class="w-full h-14 bg-surface-container-lowest border border-outline-variant rounded-xl px-md focus:outline-none focus:border-primary input-glow font-body-lg" placeholder="0" type="number"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-outline px-xs">HARGA JUAL</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-outline font-body-lg">Rp</span>
<input class="w-full h-14 bg-surface-container-lowest border border-outline-variant rounded-xl pl-12 pr-md focus:outline-none focus:border-primary input-glow font-body-lg" placeholder="0" type="text"/>
</div>
</div>
</div>
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-outline px-xs">HARGA/GRAM</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-outline font-body-lg">Rp</span>
<input class="w-full h-14 bg-surface-container-lowest border border-outline-variant rounded-xl pl-12 pr-md focus:outline-none focus:border-primary input-glow font-body-lg" placeholder="0" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-outline px-xs">ONGKOS</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-outline font-body-lg">Rp</span>
<input class="w-full h-14 bg-surface-container-lowest border border-outline-variant rounded-xl pl-12 pr-md focus:outline-none focus:border-primary input-glow font-body-lg" placeholder="0" type="text"/>
</div>
</div>
</div>
<!-- Total Card -->
<div class="bg-primary-container/10 p-lg rounded-2xl border border-primary-container/30 flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-primary/70">TOTAL ESTIMASI</label>
<p class="font-display-lg text-display-lg text-primary">Rp 0</p>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-caps text-label-caps text-outline px-xs">KETERANGAN</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-md focus:outline-none focus:border-primary input-glow font-body-lg resize-none" placeholder="Keterangan barang opsional" rows="4"></textarea>
</div>
</form>
<!-- Decorative Info Section -->
<section class="mt-md p-lg bg-secondary-fixed/20 rounded-xl flex items-start gap-md">
<span class="material-symbols-outlined text-secondary pt-1">info</span>
<div class="flex flex-col">
<h4 class="font-headline-md text-body-lg text-on-secondary-fixed-variant mb-xs">Informasi Inventaris</h4>
<p class="font-body-sm text-on-secondary-fixed-variant/70 leading-relaxed">Pastikan data berat dan harga gram sesuai dengan standar pasar hari ini untuk akurasi laporan laba rugi.</p>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="fixed bottom-0 w-full z-50 bg-surface-container-lowest shadow-[0_-8px_30px_rgba(0,0,0,0.08)] rounded-t-xl px-gutter py-md max-w-container-max mx-auto border-t border-outline-variant/10">
<div class="flex gap-md h-14">
<button class="flex-1 border border-outline text-outline font-headline-md rounded-xl hover:bg-surface-variant transition-colors active:scale-95">
                Tutup
            </button>
<button class="flex-[2] bg-primary text-on-primary font-headline-md rounded-xl shadow-lg hover:bg-primary-container transition-all active:scale-95 flex items-center justify-center gap-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                Simpan Data
            </button>
</div>
</footer>
<!-- Light Micro-interactions -->
<script>
        document.querySelectorAll('input, textarea').forEach(element => {
            element.addEventListener('focus', () => {
                element.parentElement.classList.add('scale-[1.01]');
                element.parentElement.style.transition = 'transform 0.2s ease';
            });
            element.addEventListener('blur', () => {
                element.parentElement.classList.remove('scale-[1.01]');
            });
        });

        // Simple currency formatter logic for simulation
        const currencyInputs = document.querySelectorAll('input[placeholder="0"]');
        currencyInputs.forEach(input => {
            input.addEventListener('input', (e) => {
                let value = e.target.value.replace(/\D/g, '');
                if (value) {
                    e.target.value = new Intl.NumberFormat('id-ID').format(value);
                }
            });
        });
    </script>
</body></html>
