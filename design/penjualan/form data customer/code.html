<script>
        function toggleMember(isMember) {
            const nonMemberBtn = document.getElementById('toggle-non-member');
            const memberBtn = document.getElementById('toggle-member');
            
            if (isMember) {
                memberBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/30');
                memberBtn.classList.add('bg-primary', 'text-on-primary-container');
                
                nonMemberBtn.classList.remove('bg-primary', 'text-on-primary-container');
                nonMemberBtn.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/30');
            } else {
                nonMemberBtn.classList.remove('text-on-surface-variant', 'hover:bg-surface-variant/30');
                nonMemberBtn.classList.add('bg-primary', 'text-on-primary-container');
                
                memberBtn.classList.remove('bg-primary', 'text-on-primary-container');
                memberBtn.classList.add('text-on-surface-variant', 'hover:bg-surface-variant/30');
            }
        }
    </script>
