<style>
        body { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .connection-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .canvas-bg {
            background-color: #f8f9fa;
            min-height: 100vh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="canvas-bg text-on-surface">
<!-- Top AppBar (from Shared Components JSON) -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-surface-dim shadow-sm flex items-center justify-between px-md h-12 w-full">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary dark:text-primary-fixed-dim active:scale-95 transition-transform" data-icon="menu">menu</button>
<h1 class="font-display-lg-mobile text-display-lg-mobile font-bold text-primary dark:text-primary-fixed-dim">NAGAGOLD</h1>
</div>
<div class="flex items-center gap-sm">
<div class="hidden md:flex gap-md mr-lg">
<span class="text-on-surface-variant font-label-caps text-label-caps cursor-pointer hover:bg-surface-container-high transition-colors px-2 py-1 rounded-lg">Inventory</span>
<span class="text-on-surface-variant font-label-caps text-label-caps cursor-pointer hover:bg-surface-container-high transition-colors px-2 py-1 rounded-lg">Customers</span>
<span class="text-on-surface-variant font-label-caps text-label-caps cursor-pointer hover:bg-surface-container-high transition-colors px-2 py-1 rounded-lg">Reports</span>
</div>
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container text-xs font-bold" title="Admin Profile">AP</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pt-16 pb-32 px-md md:max-w-container-max md:mx-auto">
<!-- Header: Transaksi Penjualan with Connection Status -->
<div class="flex items-center justify-between mb-lg">
<div>
<h2 class="font-display-lg-mobile text-display-lg-mobile font-bold text-on-surface">Transaksi Penjualan</h2>
<div class="flex items-center gap-xs mt-xs">
<span class="flex h-2 w-2 rounded-full bg-primary connection-dot"></span>
<span class="font-body-sm text-body-sm text-on-surface-variant">Terhubung dengan Server Pusat</span>
</div>
</div>
<button aria-label="Refresh Data" class="p-2 rounded-full hover:bg-surface-container transition-all">
<span class="material-symbols-outlined text-primary" data-icon="sync">sync</span>
</button>
</div>
<!-- Customer Info Card -->
<section class="bg-surface-container-lowest rounded-xl p-md shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-outline-variant mb-lg relative overflow-hidden">
<div class="absolute top-0 left-0 w-1 h-full bg-secondary-container"></div>
<div class="flex justify-between items-start">
<div class="flex flex-col gap-xs">
<span class="font-label-caps text-label-caps text-outline uppercase tracking-wider">Customer Data</span>
<h3 class="font-headline-md text-headline-md text-on-surface">Umum / Walk-in</h3>
<div class="flex gap-md mt-sm">
<div class="flex flex-col">
<span class="font-label-caps text-[10px] text-outline uppercase">Jenis</span>
<span class="font-body-lg text-body-lg font-bold text-on-surface">Non Member</span>
</div>
<div class="flex flex-col border-l border-outline-variant pl-md">
<span class="font-label-caps text-[10px] text-outline uppercase">Kode Sales</span>
<span class="font-body-lg text-body-lg font-bold text-on-surface">S-001 (Admin)</span>
</div>
</div>
</div>
<button aria-label="Edit Customer" class="bg-surface-container rounded-full p-2 hover:bg-surface-container-high transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="edit">edit</span>
</button>
</div>
</section>
<!-- Large Action Buttons -->
<div class="grid grid-cols-2 gap-md mb-lg">
<button class="h-12 bg-secondary-container text-on-secondary-container font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-sm shadow-md hover:brightness-95 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span>Data Customer</span>
</button>
<button class="h-12 bg-primary text-on-primary font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-sm shadow-md hover:brightness-110 active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="add_shopping_cart">add_shopping_cart</span>
<span>Data Barang</span>
</button>
</div>
<!-- Empty State Area: Daftar Barang -->
<section class="bg-surface-container-low rounded-xl border-2 border-dashed border-outline-variant min-h-[300px] flex flex-col items-center justify-center p-xl">
<div class="bg-surface-container-highest rounded-full w-20 h-20 flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-[40px] text-outline" data-icon="inventory_2">inventory_2</span>
</div>
<h4 class="font-headline-md text-headline-md text-on-surface-variant mb-xs">Daftar Barang</h4>
<p class="font-body-lg text-body-lg text-outline">Belum ada barang yang ditambahkan ke keranjang.</p>
</section>
</main>
<!-- Bottom Payment Bar -->
<footer class="fixed bottom-0 left-0 w-full bg-surface-container-lowest shadow-[0_-8px_30px_rgba(0,0,0,0.08)] px-md py-md z-40">
<div class="md:max-w-container-max md:mx-auto flex items-center justify-between gap-md">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-outline uppercase">Total Transaksi</span>
<span class="font-display-lg-mobile text-display-lg-mobile font-extrabold text-primary">Rp 0</span>
</div>
<button class="flex-1 max-w-[240px] h-12 bg-outline-variant text-on-surface-variant/40 font-headline-md text-headline-md rounded-lg cursor-not-allowed flex items-center justify-center gap-sm transition-all" disabled="">
<span>Lanjut ke Pembayaran</span>
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</footer>
<!-- BottomNavBar (from Shared Components JSON) - Mobile Only -->
<nav class="md:hidden fixed bottom-0 left-0 w-full h-16 flex justify-around items-center px-sm pb-safe bg-surface dark:bg-surface-container-lowest shadow-[0_-4px_20px_rgba(0,0,0,0.05)] z-50 rounded-t-xl hidden">
<!-- Suppressed for transactional focus on the redesign, but usually logic would go here. 
             Since the prompt asks for a "Bottom Payment Bar", that takes priority. -->
</nav>
<!-- Interactive Scripts -->
<script>
        // Micro-interaction for feedback
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function(e) {
                if(this.disabled) return;
                const ripple = document.createElement('span');
                ripple.className = 'absolute bg-white/20 rounded-full animate-ping';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.left = (e.clientX - this.getBoundingClientRect().left - 10) + 'px';
                ripple.style.top = (e.clientY - this.getBoundingClientRect().top - 10) + 'px';
                this.style.position = 'relative';
                this.style.overflow = 'hidden';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Theme management logic (Optional helper)
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            // document.documentElement.classList.add('dark');
        }
    </script>
</body></html>
