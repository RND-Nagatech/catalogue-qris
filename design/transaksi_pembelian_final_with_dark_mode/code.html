<!DOCTYPE html>

<style>
        body { font-family: 'Manrope', sans-serif; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

<body class="bg-background text-on-background min-h-screen pb-24 transition-colors duration-300 dark:bg-inverse-surface dark:text-inverse-on-surface">
<!-- Top AppBar -->
<header class="sticky top-0 z-40 bg-surface dark:bg-tertiary border-b border-outline-variant flex items-center justify-between px-margin-mobile h-16 w-full">
<div class="flex items-center gap-3">
<button class="p-2 text-primary dark:text-primary-fixed hover:bg-surface-container transition-colors scale-95 active:scale-90">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface dark:text-inverse-on-surface">Transaksi Pembelian</h1>
</div>
<div class="flex items-center gap-1">
<!-- Dark Mode Toggle -->
<button class="p-2 text-on-surface-variant dark:text-tertiary-fixed hover:bg-surface-container-high dark:hover:bg-tertiary-container rounded-full transition-colors" onclick="toggleDarkMode()">
<span class="material-symbols-outlined dark-hide">dark_mode</span>
<span class="material-symbols-outlined dark-show">light_mode</span>
</button>
<button class="p-2 text-primary dark:text-primary-fixed hover:bg-surface-container transition-colors scale-95 active:scale-90">
<span class="material-symbols-outlined">more_vert</span>
</button>
</div>
</header>
<main class="px-margin-mobile pt-stack-lg space-y-6">
<!-- Stepper -->
<section class="flex justify-between items-center relative px-4 py-2">
<div class="absolute top-1/2 left-8 right-8 h-[2px] bg-surface-container-highest dark:bg-tertiary-container -translate-y-1/2 -z-10"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary dark:bg-primary-container text-white dark:text-primary-fixed flex items-center justify-center font-bold text-lg shadow-sm border-4 border-white dark:border-inverse-surface ring-1 ring-primary/10">1</div>
<span class="font-label-sm text-label-sm text-primary dark:text-primary-fixed">Input Barang</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest dark:bg-tertiary text-on-surface-variant dark:text-outline flex items-center justify-center font-bold text-lg border-4 border-white dark:border-inverse-surface">2</div>
<span class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Lihat Data</span>
</div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-surface-container-highest dark:bg-tertiary text-on-surface-variant dark:text-outline flex items-center justify-center font-bold text-lg border-4 border-white dark:border-inverse-surface">3</div>
<span class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Customer</span>
</div>
</section>
<!-- Form Section: Shop Selection -->
<section class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline px-1 uppercase tracking-wider">Pilih Kode Toko</label>
<button class="w-full h-14 px-4 rounded-xl border border-outline-variant dark:border-outline bg-white dark:bg-tertiary flex items-center justify-between hover:border-primary transition-colors text-left" onclick="openBottomSheet('toko-sheet')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface" id="selected-toko">QPS - QC SAMBAS PWJ PUSAT</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</button>
</section>
<!-- Form Section: Barcode -->
<section class="bg-surface-container-lowest dark:bg-tertiary-container p-5 rounded-2xl border border-outline-variant dark:border-outline shadow-sm space-y-4">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Kode Barcode</label>
<div class="relative group">
<input class="w-full h-14 pl-4 pr-12 rounded-xl border border-outline-variant dark:border-outline focus:border-primary focus:ring-1 focus:ring-primary/20 transition-all text-body-lg bg-surface-bright dark:bg-tertiary text-on-surface dark:text-inverse-on-surface" placeholder="Scan atau input barcode" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary-container dark:text-primary-fixed">barcode_scanner</span>
</div>
</div>
<button class="w-full h-12 bg-surface-container-low dark:bg-tertiary border border-primary dark:border-primary-fixed text-primary dark:text-primary-fixed font-bold rounded-xl flex items-center justify-center gap-2 active:bg-primary/5 transition-all">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">inventory_2</span>
                Ambil Data Barang
            </button>
</section>
<!-- Form Section: Conditions -->
<section class="grid grid-cols-1 gap-6">
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline px-1 uppercase tracking-wider">Type Kondisi</label>
<div class="flex gap-2">
<button class="flex-1 py-3 rounded-xl border-2 border-primary dark:border-primary-fixed bg-primary-fixed dark:bg-primary-container text-on-primary-fixed-variant dark:text-primary-fixed font-bold text-body-md shadow-sm">PERSENTASE</button>
<button class="px-6 py-3 rounded-xl border border-outline-variant dark:border-outline bg-white dark:bg-tertiary text-on-surface-variant dark:text-outline font-medium">RP</button>
</div>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline px-1 uppercase tracking-wider">Kondisi</label>
<div class="flex flex-wrap gap-2">
<button class="px-6 py-3 rounded-xl border-2 border-primary dark:border-primary-fixed bg-primary-fixed dark:bg-primary-container text-on-primary-fixed-variant dark:text-primary-fixed font-bold shadow-sm">MULUS</button>
<button class="px-6 py-3 rounded-xl border border-outline-variant dark:border-outline bg-white dark:bg-tertiary text-on-surface-variant dark:text-outline font-medium">RUSAK</button>
<button class="px-6 py-3 rounded-xl border border-outline-variant dark:border-outline bg-white dark:bg-tertiary text-on-surface-variant dark:text-outline font-medium">CUCI</button>
</div>
</div>
</section>
<!-- Form Section: Jenis -->
<section class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline px-1 uppercase tracking-wider">Kode Jenis</label>

<span class="text-body-lg text-on-surface dark:text-inverse-on-surface" id="selected-jenis">Pilih Jenis Barang</span>
<span class="material-symbols-outlined text-outline">expand_more</span>
</button>
</section>
<!-- Detailed Form Fields -->
<section class="grid grid-cols-2 gap-4">
<div class="col-span-2 space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Nama Barang</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-outline focus:border-primary focus:ring-1 focus:ring-primary/20 bg-white dark:bg-tertiary text-on-surface dark:text-inverse-on-surface" placeholder="Masukkan nama barang" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Kadar (%)</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-outline focus:border-primary focus:ring-1 focus:ring-primary/20 bg-white dark:bg-tertiary text-on-surface dark:text-inverse-on-surface" placeholder="0" type="number"/>
</div>
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Berat (gr)</label>
<input class="w-full h-12 px-4 rounded-lg border border-outline-variant dark:border-outline focus:border-primary focus:ring-1 focus:ring-primary/20 bg-white dark:bg-tertiary text-on-surface dark:text-inverse-on-surface" placeholder="0.00" step="0.01" type="number"/>
</div>
<div class="col-span-2 space-y-2">
<label class="font-label-sm text-label-sm text-on-surface-variant dark:text-outline">Harga Beli (Rp)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant dark:text-outline font-bold">Rp</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-outline-variant dark:border-outline bg-white dark:bg-tertiary focus:border-primary font-headline-md text-primary dark:text-primary-fixed" placeholder="0" type="number"/>
</div>
</div>
</section>
<!-- CTA Action -->
<button class="w-full h-16 bg-primary dark:bg-primary-container text-white dark:text-primary-fixed font-bold text-lg rounded-2xl shadow-lg shadow-primary/20 flex items-center justify-center gap-3 active:scale-[0.98] transition-transform">
            Simpan &amp; Lanjutkan
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-white dark:bg-tertiary py-2 px-4 h-[72px] border-t border-outline-variant dark:border-outline z-40">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:text-primary dark:hover:text-primary-fixed transition-colors px-4" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label-sm text-label-sm">Beranda</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:text-primary dark:hover:text-primary-fixed transition-colors px-4" href="#">
<span class="material-symbols-outlined">sell</span>
<span class="font-label-sm text-label-sm">Penjualan</span>
</a>
<a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-bold px-4" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart</span>
<span class="font-label-sm text-label-sm">Pembelian</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:text-primary dark:hover:text-primary-fixed transition-colors px-4" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-label-sm text-label-sm">Riwayat</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline hover:text-primary dark:hover:text-primary-fixed transition-colors px-4" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="font-label-sm text-label-sm">Pengaturan</span>
</a>
</nav>
<!-- Bottom Sheets & Overlays -->
<div class="overlay fixed inset-0 bg-black/60 z-[60]" id="overlay" onclick="closeAllBottomSheets()"></div>
<!-- Toko Bottom Sheet -->
<div class="bottom-sheet fixed bottom-0 left-0 right-0 bg-white dark:bg-tertiary rounded-t-3xl z-[70] max-h-[80vh] overflow-hidden flex flex-col" id="toko-sheet">
<div class="w-12 h-1 bg-surface-variant dark:bg-outline rounded-full mx-auto my-3"></div>
<div class="px-margin-mobile pb-4">
<h3 class="font-headline-md text-on-surface dark:text-inverse-on-surface mb-4">Pilih Kode Toko</h3>
<div class="relative mb-4">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container dark:bg-tertiary-container rounded-xl border-none focus:ring-2 focus:ring-primary dark:text-inverse-on-surface" placeholder="Cari toko..." type="text"/>
</div>
</div>
<div class="flex-1 overflow-y-auto px-margin-mobile pb-8 space-y-1">
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container active:bg-surface-container flex items-center justify-between group" onclick="selectItem('toko', 'QPS - QC SAMBAS PWJ PUSAT')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">QPS - QC SAMBAS PWJ PUSAT</span>
<span class="material-symbols-outlined text-primary dark:text-primary-fixed hidden group-[.selected]:block">check_circle</span>
</button>
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container active:bg-surface-container" onclick="selectItem('toko', 'QSPP - QC SAMBAS PRODUKSI')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">QSPP - QC SAMBAS PRODUKSI</span>
</button>
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container active:bg-surface-container" onclick="selectItem('toko', 'QSP - QC SAMBAS PWJ')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">QSP - QC SAMBAS PWJ</span>
</button>
</div>
</div>
<!-- Jenis Bottom Sheet -->
<div class="bottom-sheet fixed bottom-0 left-0 right-0 bg-white dark:bg-tertiary rounded-t-3xl z-[70] max-h-[80vh] overflow-hidden flex flex-col" id="jenis-sheet">
<div class="w-12 h-1 bg-surface-variant dark:bg-outline rounded-full mx-auto my-3"></div>
<div class="px-margin-mobile pb-4">
<h3 class="font-headline-md text-on-surface dark:text-inverse-on-surface mb-4">Pilih Kode Jenis</h3>
<div class="relative mb-4">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full h-12 pl-10 pr-4 bg-surface-container dark:bg-tertiary-container rounded-xl border-none focus:ring-2 focus:ring-primary dark:text-inverse-on-surface" placeholder="Cari jenis barang..." type="text"/>
</div>
</div>
<div class="flex-1 overflow-y-auto px-margin-mobile pb-8 space-y-1">
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container" onclick="selectItem('jenis', 'ABB - KL BORSALINO TUA')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">ABB - KL BORSALINO TUA</span>
</button>
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container" onclick="selectItem('jenis', 'AKRILIK - AKRILIK LM')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">AKRILIK - AKRILIK LM</span>
</button>
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container" onclick="selectItem('jenis', 'BER - BERLIAN')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">BER - BERLIAN</span>
</button>
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container" onclick="selectItem('jenis', 'BIB - KL ITALY TUA')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">BIB - KL ITALY TUA</span>
</button>
<button class="w-full p-4 text-left rounded-xl hover:bg-surface-container-low dark:hover:bg-tertiary-container" onclick="selectItem('jenis', 'BT - BATU')">
<span class="text-body-lg text-on-surface dark:text-inverse-on-surface">BT - BATU</span>
</button>
</div>
</div>
<script>
        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
        }

        function openBottomSheet(id) {
            document.getElementById('overlay').classList.add('active');
            document.getElementById(id).classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeAllBottomSheets() {
            document.getElementById('overlay').classList.remove('active');
            document.querySelectorAll('.bottom-sheet').forEach(sheet => {
                sheet.classList.remove('open');
            });
            document.body.style.overflow = 'auto';
        }

        function selectItem(type, value) {
            const displayId = type === 'toko' ? 'selected-toko' : 'selected-jenis';
            document.getElementById(displayId).innerText = value;
            document.getElementById(displayId).classList.add('text-on-surface');
            closeAllBottomSheets();
        }

        // Chip selection logic
        document.querySelectorAll('section .flex.gap-2 button, section .flex.flex-wrap.gap-2 button').forEach(btn => {
            btn.addEventListener('click', function() {
                const group = this.parentElement;
                group.querySelectorAll('button').forEach(b => {
                    // Reset to unselected state
                    b.classList.remove('border-primary', 'bg-primary-fixed', 'text-on-primary-fixed-variant', 'font-bold', 'shadow-sm', 'border-2', 'dark:border-primary-fixed', 'dark:bg-primary-container', 'dark:text-primary-fixed');
                    b.classList.add('border-outline-variant', 'bg-white', 'text-on-surface-variant', 'font-medium', 'border', 'dark:border-outline', 'dark:bg-tertiary', 'dark:text-outline');
                });
                // Set to selected state
                this.classList.add('border-primary', 'bg-primary-fixed', 'text-on-primary-fixed-variant', 'font-bold', 'shadow-sm', 'border-2', 'dark:border-primary-fixed', 'dark:bg-primary-container', 'dark:text-primary-fixed');
                this.classList.remove('border-outline-variant', 'bg-white', 'text-on-surface-variant', 'font-medium', 'border', 'dark:border-outline', 'dark:bg-tertiary', 'dark:text-outline');
            });
        });
    </script>
</body></html>
